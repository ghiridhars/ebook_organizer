version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ebook_organizer_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ebook_data:/app/data
      - /mnt/library:/library               # External SSD mount point for ebooks
      - /mnt/library/inbox:/library/inbox    # Watchdog monitored drop folder
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/ebook_organizer.db
      - WATCH_DIR=/library/inbox
      - LIBRARY_DIR=/library
      - COVERS_DIR=/app/data/covers
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '3.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    container_name: ebook_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Note: Flutter desktop apps typically don't run in containers
  # This is a build service only
  flutter-builder:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: ebook_organizer_flutter_builder
    working_dir: /app
    volumes:
      - ./ebook_organizer_gui:/app
      - flutter-pub-cache:/root/.pub-cache
    command: |
      sh -c "
        flutter pub get &&
        flutter build linux --release
      "
    profiles:
      - build

volumes:
  ebook_data:
  caddy_data:
  caddy_config:
  flutter-pub-cache:

networks:
  default:
    name: ebook_organizer_network
